cluster_name="wasp-local"
cluster_version="1.31"

# Domínio local
domain="wasp.local"

# Subdomínios no /etc/hosts → 127.0.0.1
# wasp.local
# auth.wasp.local
# discovery.wasp.local
# idp.wasp.local
# customer1.wasp.local
# customer2.wasp.local

# Imagens Docker Hub
image_discovery="silviosilva/wasp-discovery"
image_platform_frontend="silviosilva/wasp-platform-frontend"
image_callback_handler="silviosilva/wasp-callback-handler"

# Keycloak
keycloak_realm="wasp"
keycloak_admin_user="admin"
keycloak_admin_password="admin"
keycloak_namespace="keycloak"

# Portas k3d (host → container)
http_port="9080"
https_port="9443"
haproxy_nodeport="32080"  # NodePort do HAProxy Ingress Controller
