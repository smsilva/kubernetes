---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: aws-eks-cluster
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: default
  source:
    repoURL: https://github.com/smsilva/kubernetes.git
    targetRevision: dev
    path: lab/crossplane/aws/aws-eks-cluster
    helm:
      valueFiles:
        - values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: poc
  syncPolicy:
    automated:
      prune: false
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
