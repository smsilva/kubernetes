# wave 2 — ProviderConfig depende dos providers estarem Healthy.
---
apiVersion: aws.upbound.io/v1beta1
kind: ProviderConfig
metadata:
  name: default
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  credentials:
    source: Secret
    secretRef:
      namespace: {{ .Values.aws.credentialsSecret.namespace }}
      name: {{ .Values.aws.credentialsSecret.name }}
      key: {{ .Values.aws.credentialsSecret.key }}
