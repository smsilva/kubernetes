name: deploy-eks-lab-docs

on:
  workflow_dispatch:

  push:
    branches:
      - main
    paths:
      - 'lab/aws/eks/docs/**'
      - 'lab/aws/eks/mkdocs.yml'

env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: lab/aws/eks
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install MkDocs dependencies
        run: pip install "mkdocs-material>=9.0,<10"

      - name: Build site
        run: mkdocs build --strict

      - uses: actions/upload-pages-artifact@v4
        with:
          path: lab/aws/eks/site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
